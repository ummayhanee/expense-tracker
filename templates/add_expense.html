<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Add Expense</title>
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">➕ Add New Expense</h2>

    <div class="card shadow p-4">
	<form action="/add_expense" method="POST">

    <label>Expense Name</label><br>
    <input type="text" name="expense" class="form-control" required><br><br>

    <label>Amount</label><br>
    <input type="number" name="amount" class="form-control" required><br><br>

    <label>Category</label><br>
    <select name="category" class="form-select">

    <option>Food</option>
    <option>Transport</option>
    <option>Shopping</option>
    <option>Bills</option>
    <option>Entertainment</option>
    <option>Health</option>
    <option>Other</option>

	</select><br><br>

    <label>Date</label><br>
    <input type="date" name="date" class="form-control" required><br><br>

    <button class="btn btn-success w-100">
    Save Expense
</button>

</form>
</div>
<br>

<a href="/" class="btn btn-secondary mt-3">
    ← Back to Dashboard
</a>
</div>
</body>
</html>
