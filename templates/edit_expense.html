<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Edit Expense</h2>

<form method="POST">

    <label>Expense</label><br>
    <input type="text" name="expense" value="{{ expense[1] }}" required>
    <br><br>

    <label>Amount</label><br>
    <input type="number" name="amount" value="{{ expense[2] }}" required>
    <br><br>

    <label>Category</label><br>

    <select name="category" class="form-select">

    <option value="Food" {% if expense[4] == "Food" %}selected{% endif %}>Food</option>
    <option value="Transport" {% if expense[4] == "Transport" %}selected{% endif %}>Transport</option>
    <option value="Shopping" {% if expense[4] == "Shopping" %}selected{% endif %}>Shopping</option>
    <option value="Bills" {% if expense[4] == "Bills" %}selected{% endif %}>Bills</option>
    <option value="Entertainment" {% if expense[4] == "Entertainment" %}selected{% endif %}>Entertainment</option>
    <option value="Health" {% if expense[4] == "Health" %}selected{% endif %}>Health</option>
    <option value="Other" {% if expense[4] == "Other" %}selected{% endif %}>Other</option>

    </select>

    <br><br>

    <label>Date</label><br>
    <input type="date" name="date" value="{{ expense[3] }}" required>
    <br><br>

    <button type="submit">Update Expense</button>

</form>

<br>

<a href="{{ url_for('home') }}">Back to Home</a>

</body>
</html>
